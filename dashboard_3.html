<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatzolah CJ — Member Call Dashboard</title>
<style>
  :root{
    --ink:#0f1b2d; --paper:#f7f6f2; --card:#ffffff; --line:#e4e2da;
    --accent:#c4302b; --day:#c4302b; --night:#1c5fa8;
    --als:#b3261e; --als-bg:#fbe6e4; --bls:#1c5fa8; --bls-bg:#e6eef7;
    --good:#1f7a4d; --good-bg:#e6f4ec; --warn:#b5651d; --warn-bg:#fbeede;
    --bad:#b3261e; --bad-bg:#fbe6e4; --muted:#6a7280; --track:#ecebe4;
    --up:#1f7a4d; --down:#b3261e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:var(--paper);color:var(--ink);line-height:1.4;-webkit-text-size-adjust:100%}
  .wrap{max-width:1080px;margin:0 auto;padding:16px}
  header{padding:18px 0 12px;border-bottom:2px solid var(--ink)}
  .kicker{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:1.7rem;font-weight:800;letter-spacing:-.01em;margin-top:2px}
  .sub{color:var(--muted);font-size:.9rem;margin-top:4px}
  .sub strong{color:var(--ink)}
  .nav{display:flex;gap:8px;margin-top:12px}
  .nav a{font-size:.85rem;font-weight:700;text-decoration:none;color:var(--muted);padding:8px 14px;border:1px solid var(--line);border-radius:8px;background:var(--card)}
  .nav a.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
  .stat .n{font-size:1.5rem;font-weight:800;line-height:1}
  .stat .l{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:5px}
  .stat.good .n{color:var(--good)} .stat.bad .n{color:var(--bad)}
  .stat.als .n{color:var(--als)} .stat.bls .n{color:var(--bls)}
  .delta{font-size:.8rem;font-weight:800;margin-left:6px}
  .delta.up{color:var(--up)} .delta.down{color:var(--down)}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin:16px 0}
  .panelhead{display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-bottom:10px}
  .panel h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:14px 0}
  .search{flex:1;min-width:160px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:.95rem;background:var(--card)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card)}
  .seg button{border:0;background:transparent;padding:8px 13px;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--ink);color:#fff}
  .seg.type button.on[data-t="ALS"]{background:var(--als)}
  .seg.type button.on[data-t="BLS"]{background:var(--bls)}
  .seg.dn button.on[data-d="day"]{background:var(--day)}
  .seg.dn button.on[data-d="night"]{background:var(--night)}
  .tablewrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:11px 12px;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
  th.sorted::after{content:" \25BC";font-size:.6rem}
  th.sorted.asc::after{content:" \25B2"}
  td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:.92rem;vertical-align:middle}
  tr:last-child td{border-bottom:0}
  tr:hover td{background:#faf9f5}
  .name{font-weight:700} .id{color:var(--muted);font-size:.78rem;font-weight:500}
  .num{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .goalcell{text-align:right;font-variant-numeric:tabular-nums;color:var(--muted)}
  .tag{display:inline-block;font-size:.66rem;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.04em}
  .tag.ALS{color:var(--als);background:var(--als-bg)}
  .tag.BLS{color:var(--bls);background:var(--bls-bg)}
  .tag.Observer{color:#5c4a1a;background:#f3ecd6}
  .tag.Other{color:var(--muted);background:#eceae3}
  .declinebtn{border:1px solid var(--bad);background:var(--bad-bg);color:var(--bad);font-weight:700;font-size:.85rem;padding:9px 14px;border-radius:8px;cursor:pointer}
  .declinebtn.on{background:var(--bad);color:#fff}
  .declinebtn #declineCount{margin-left:7px;font-weight:800}
  .declineactive{font-size:.8rem;color:var(--muted);align-self:center}
  .declineactive a{color:var(--bad);font-weight:700}
  .spark{display:inline-block;vertical-align:middle}
  .prog{display:flex;align-items:center;gap:8px;min-width:150px}
  .bar{flex:1;height:8px;background:var(--track);border-radius:99px;overflow:hidden}
  .bar span{display:block;height:100%;border-radius:99px;background:var(--good)}
  .bar span.b-warn{background:var(--warn)} .bar span.b-bad{background:var(--bad)}
  .pct{font-size:.78rem;font-weight:700;width:38px;text-align:right;font-variant-numeric:tabular-nums}
  .badge{display:inline-block;font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
  .badge.on{color:var(--good);background:var(--good-bg)}
  .badge.close{color:var(--warn);background:var(--warn-bg)}
  .badge.behind{color:var(--bad);background:var(--bad-bg)}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  footer{margin:18px 0 30px;color:var(--muted);font-size:.78rem;text-align:center}
  .note{font-size:.8rem;color:var(--muted);margin:6px 0 0}
  .chartbox{position:relative;width:100%;height:240px}
  svg.trend{width:100%;height:100%;overflow:visible}
  .axislbl{font-size:10px;fill:var(--muted)}
  .lgnd{display:inline-flex;gap:14px;font-size:.75rem;color:var(--muted);align-items:center}
  .lgnd i{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
  @media(max-width:640px){
    h1{font-size:1.35rem}.stats{grid-template-columns:repeat(2,1fr)}
    .hide-sm{display:none}td,th{padding:9px 8px;font-size:.85rem}.prog{min-width:84px}
    .wrap{padding:12px}
    .controls{gap:8px;margin:12px 0}
    .search{flex:1 1 100%;min-width:0;font-size:16px}
    .seg{display:flex;width:100%}
    .seg button{flex:1;padding:9px 6px;font-size:.78rem;text-align:center}
    .declinebtn{width:100%;text-align:center}
    .declineactive{align-self:flex-start}
    td,th{padding:9px 7px}
    .name{font-size:.9rem}.id{font-size:.72rem}
    .trendchip{font-size:.8rem}
    /* keep the 6-month bars on mobile, just tighter */
    .mbars .track,.mbars .col{height:30px}
    .mbars .b{width:7px}
    .mbars .lb{width:7px;font-size:7px}
    .mbars .labels{gap:2px}.mbars .track{gap:2px}
    td.bars-col{padding:6px 4px}
  }
  @media(max-width:400px){
    .stats{grid-template-columns:1fr}
    .seg button{font-size:.72rem;padding:8px 4px}
  }

  .mbars{display:inline-flex;flex-direction:column;gap:3px;vertical-align:middle}
  .mbars .track{display:inline-flex;align-items:flex-end;gap:3px;height:36px}
  .mbars .col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:36px}
  .mbars .b{width:9px;border-radius:2px 2px 0 0;background:#c9c6bd}
  .mbars .b.q2{background:var(--bar-c,var(--accent))}
  .mbars .b.na{height:3px!important;background:var(--track)}
  .mbars .labels{display:inline-flex;gap:3px}
  .mbars .lb{width:9px;text-align:center;font-size:8px;color:var(--muted);letter-spacing:-.02em}
  .mbars .lb.q2{color:var(--bar-c,var(--accent));font-weight:700}
  .trendchip{display:inline-flex;align-items:center;gap:5px;font-weight:800;font-size:.86rem;font-variant-numeric:tabular-nums}
  .trendchip .arw{font-size:.72rem}
  .trendchip.up{color:var(--up)} .trendchip.down{color:var(--down)} .trendchip.flat{color:var(--muted)}
  .mrow:hover td{background:#f3f1ea}
  .modal-overlay{position:fixed;inset:0;background:rgba(15,27,45,.5);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:24px 16px;overflow-y:auto}
  .modal-card{background:var(--card);border-radius:16px;max-width:720px;width:100%;padding:22px 24px 26px;position:relative;box-shadow:0 12px 40px rgba(0,0,0,.25);margin:auto}
  .modal-close{position:absolute;top:14px;right:16px;border:0;background:transparent;font-size:1.7rem;line-height:1;color:var(--muted);cursor:pointer;padding:2px 8px;border-radius:6px}
  .modal-close:hover{background:#f0eee7;color:var(--ink)}
  .mh{display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-right:30px}
  .mavatar{width:48px;height:48px;border-radius:50%;background:#e6eef7;color:#1c5fa8;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px}
  .mname{font-weight:800;font-size:1.15rem}
  .mmeta{font-size:.85rem;color:var(--muted)}
  .mtrend{font-weight:800;font-size:.9rem;font-variant-numeric:tabular-nums;text-align:right}
  .mtrend span{display:block;font-size:.68rem;font-weight:600;color:var(--muted)}
  .mtrend.up{color:var(--up)} .mtrend.down{color:var(--down)} .mtrend.flat{color:var(--muted)}
  .mstats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:20px}
  .mstat{background:var(--paper);border-radius:9px;padding:10px 12px}
  .mstat .l{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .mstat .n{font-size:1.35rem;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;margin-top:3px}
  .mchart-label{font-size:.8rem;color:var(--muted);margin-bottom:6px;font-weight:600}
  .mchart-wrap{position:relative;width:100%;height:200px;margin-bottom:20px}
  .mchart-wrap.sm{height:165px}
  .mgrid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:560px){.mstats{grid-template-columns:repeat(2,1fr)}.mgrid2{grid-template-columns:1fr}.modal-card{padding:18px 16px 22px}}
  .metricseg{margin-left:auto}
</style></head><body><div class="wrap">
<header>
  <div class="kicker">Hatzolah CJ · Captain's App</div>
  <h1>Member Call Dashboard</h1>
  <p class="sub" id="sub">Loading…</p>
  <nav class="nav"><a class="on" href="#">Members</a><a href="goal_tracker.html">Goal Tracking</a></nav>
</header>

<div class="controls">
  <input class="search" id="search" placeholder="Search member or ID…">
  <div class="seg type" id="typeseg">
    <button data-t="ALL" class="on">All</button>
    <button data-t="ALS">ALS</button>
    <button data-t="BLS">BLS</button>
    <button data-t="Observer">Observer</button>
  </div>
  <div class="seg" id="periodseg">
    <button data-p="quarter" class="on">Quarter</button>
    <button data-p="month">Monthly</button>
    <button data-p="ytd">Year to date</button>
  </div>
  <div class="seg dn metricseg" id="dnseg">
    <button data-d="total" class="on">Total</button>
    <button data-d="day">Day</button>
    <button data-d="night">Night</button>
  </div>
</div>
<div class="controls" style="margin-top:-4px">
  <button id="declineBtn" class="declinebtn">⚠ Trending down &gt;10%<span id="declineCount"></span></button>
  <span id="declineActive" class="declineactive" style="display:none">Showing members whose calls dropped more than 10% (Apr–Jun vs Jan–Mar). <a href="#" id="clearDecline">Clear</a></span>
</div>
<p class="note" id="pnote"></p>

<div class="tablewrap"><table><thead><tr>
  <th data-k="name">Member</th>
  <th data-k="type" class="hide-sm">Type</th>
  <th data-k="calls" class="num" id="callsHead">Calls</th>
  <th data-k="bars" class="bars-col">6-month calls</th>
  <th data-k="trend">Trend (3 mo)</th>
</tr></thead><tbody id="tbody"></tbody></table>
<div class="empty" id="empty" style="display:none">No members match.</div></div>

<footer>Read-only · Monthly reports Jan–Jun 2026 · <span id="asof"></span></footer>
</div>

  if(state.declineOnly) rows=rows.filter(r=>r.tr.dir==="down"&&r.tr.pc<=-10);
  const k=state.sortKey,dir=state.asc?1:-1;
  rows.sort((a,b)=>{let x,y;
    if(k==="name"){x=(a.m.first+a.m.last).toLowerCase();y=(b.m.first+b.m.last).toLowerCase();return x<y?-dir:x>y?dir:0;}
    if(k==="type"){return a.m.type<b.m.type?-dir:a.m.type>b.m.type?dir:0;}
    if(k==="trend"){x=a.tr.pc;y=b.tr.pc;} else if(k==="bars"){x=a.calls;y=b.calls;} else {x=a.calls;y=b.calls;}
    return(x-y)*dir;});
  document.getElementById("tbody").innerHTML=rows.map(r=>{
    const t=r.tr, arrow=t.dir==="up"?"▲":t.dir==="down"?"▼":"—";
    const pctxt=t.dir==="flat"?"0%":`${Math.abs(t.pc)}%`;
    return `<tr class="mrow" data-id="${r.m.id}" style="cursor:pointer">
      <td><div class="name">${r.m.first} ${r.m.last}</div><div class="id">${r.m.id||""}</div></td>
      <td class="hide-sm"><span class="tag ${r.m.type}">${r.m.type}</span></td>
      <td class="num">${r.calls}</td>
      <td class="bars-col">${bars(r.m,t.dir)}</td>
      <td><span class="trendchip ${t.dir}"><span class="arw">${arrow}</span> ${pctxt}</span></td>
    </tr>`;}).join("");
  document.querySelectorAll(".mrow").forEach(tr=>tr.addEventListener("click",()=>openMember(tr.dataset.id)));
  document.getElementById("empty").style.display=rows.length?"none":"block";
  document.querySelectorAll("th").forEach(th=>{th.classList.toggle("sorted",th.dataset.k===k);th.classList.toggle("asc",th.dataset.k===k&&state.asc);});
  // header label reflects period
  document.getElementById("callsHead").textContent =
    state.period==="quarter"?"Calls (Q2)":state.period==="month"?("Calls ("+fmtM(state.selMonth)+")"):"Calls (YTD)";
}

function updateNote(){
  const el=document.getElementById("pnote");
  const metric=state.metric==="total"?"all calls":state.metric+" calls";
  let base;
  if(state.period==="quarter") base=`Showing current quarter (Apr–Jun 2026), ${metric}.`;
  else if(state.period==="month") base=`Showing ${fmtM(state.selMonth)} 2026, ${metric}. Use the month buttons to switch.`;
  else base=`Showing year to date (Jan–Jun 2026), ${metric}.`;
  el.innerHTML = base + ` &nbsp;Trend arrow compares latest 3 months (Apr–Jun) vs prior 3 (Jan–Mar). Bars: <span style="color:#c9c6bd">grey = Q1</span>, <span style="color:var(--accent)">red = Q2</span>.`;
  // month picker inline
  if(state.period==="month"){
    if(!document.getElementById("monthpick")){
      const wrap=document.createElement("div");wrap.className="seg";wrap.id="monthpick";wrap.style.marginTop="8px";
      wrap.innerHTML=MONTHS.map(mm=>`<button data-m="${mm}" class="${mm===state.selMonth?'on':''}">${fmtM(mm)}</button>`).join("");
      el.after(wrap);
      wrap.addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
        wrap.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");
        state.selMonth=b.dataset.m;updateNote();render();});
    }
  } else { const mp=document.getElementById("monthpick"); if(mp) mp.remove(); }
}

document.getElementById("typeseg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#typeseg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.type=b.dataset.t;render();});
document.getElementById("periodseg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#periodseg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.period=b.dataset.p;updateNote();render();});
document.getElementById("dnseg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#dnseg button").forEach(x=>x.classList.remove("on"));b.classList.add("on");state.metric=b.dataset.d;
  document.getElementById("declineCount").textContent=" ("+declineCountAll()+")";updateNote();render();});
document.getElementById("search").addEventListener("input",e=>{state.q=e.target.value;render();});
document.querySelectorAll("th").forEach(th=>th.addEventListener("click",()=>{const k=th.dataset.k;
  if(state.sortKey===k)state.asc=!state.asc;else{state.sortKey=k;state.asc=(k==="name"||k==="type");}render();}));

function declineCountAll(){ // count on current metric, whole roster (ignoring type/search)
  return state.members.filter(m=>{const t=trend(m);return t.dir==="down"&&t.pc<=-10;}).length;
}
function setDecline(on){
  state.declineOnly=on;
  document.getElementById("declineBtn").classList.toggle("on",on);
  document.getElementById("declineActive").style.display=on?"inline":"none";
  if(on){state.sortKey="trend";state.asc=true;} // worst drops first
  render();
}
document.getElementById("declineBtn").addEventListener("click",()=>setDecline(!state.declineOnly));
document.getElementById("clearDecline").addEventListener("click",e=>{e.preventDefault();setDecline(false);});

function init(){
  document.getElementById("asof").textContent="Live monthly reports";
  state.members=MEMBERS;
  const als=state.members.filter(m=>m.type==="ALS").length,bls=state.members.filter(m=>m.type==="BLS").length;
  document.getElementById("sub").innerHTML=`<strong>${state.members.length}</strong> members · ${als} ALS · ${bls} BLS · Jan–Jun 2026`;
  document.getElementById("declineCount").textContent=" ("+declineCountAll()+")";
  updateNote();render();
}
init();
</script>
<div id="memberModal" class="modal-overlay" style="display:none">
  <div class="modal-card">
    <button class="modal-close" id="modalClose" aria-label="Close">×</button>
    <div id="modalBody"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
const CHART_INSTANCES=[];
function destroyCharts(){while(CHART_INSTANCES.length){const c=CHART_INSTANCES.pop();try{c.destroy();}catch(e){}}}
function mCalls(m,mos,metric){let t=0;mos.forEach(mm=>{const v=m.monthly[mm];if(v)t+=v[metric];});return t;}
function fmtMon(mm){const[y,mo]=mm.split("-");return new Date(y,mo-1).toLocaleDateString(undefined,{month:"short"});}

function openMember(id){
  const m=state.members.find(x=>x.id===id);if(!m)return;
  destroyCharts();
  const day=MONTHS.map(mm=>m.monthly[mm]?m.monthly[mm].day:0);
  const night=MONTHS.map(mm=>m.monthly[mm]?m.monthly[mm].night:0);
  const total=MONTHS.map(mm=>m.monthly[mm]?m.monthly[mm].total:0);
  const active=MONTHS.filter(mm=>m.monthly[mm]);
  const six=total.reduce((a,b)=>a+b,0);
  const q1=mCalls(m,PRIOR_Q,"total"),q2=mCalls(m,LATEST_Q,"total");
  const avg=active.length?Math.round(six/active.length):0;
  const best=Math.max(...total);
  const dayT=day.reduce((a,b)=>a+b,0),nightT=night.reduce((a,b)=>a+b,0);
  const dayPct=six?Math.round(dayT/six*100):0, nightPct=100-dayPct;
  const diff=q2-q1, pc=q1>0?Math.round(diff/q1*100):(q2>0?100:0);
  const dir=diff>0?"up":diff<0?"down":"flat";
  // rank vs all members by this-quarter (Q2) total; ties share a rank
  const rank=state.members.filter(x=>mCalls(x,LATEST_Q,"total")>q2).length+1;
  // rank within same type
  const sameType=state.members.filter(x=>x.type===m.type);
  const typeRank=sameType.filter(x=>mCalls(x,LATEST_Q,"total")>q2).length+1;
  const initials=(m.first[0]||"")+(m.last[0]||"");
  const tcol=m.type==="ALS"?"#b3261e":m.type==="BLS"?"#1c5fa8":"#5c4a1a";

  document.getElementById("modalBody").innerHTML=`
    <div class="mh">
      <div class="mavatar">${initials}</div>
      <div style="flex:1">
        <div class="mname">${m.first} ${m.last}</div>
        <div class="mmeta">${m.id} · <span style="color:${tcol};font-weight:700">${m.type}</span></div>
      </div>
      <div class="mtrend ${dir}">${dir==="up"?"▲":dir==="down"?"▼":"—"} ${dir==="flat"?"0%":Math.abs(pc)+"%"} <span>vs last quarter</span></div>
    </div>
    <div class="mstats">
      <div class="mstat"><div class="l">This quarter</div><div class="n">${q2}</div></div>
      <div class="mstat"><div class="l">6-month total</div><div class="n">${six}</div></div>
      <div class="mstat"><div class="l">Monthly avg</div><div class="n">${avg}</div></div>
      <div class="mstat"><div class="l">Best month</div><div class="n">${best}</div></div>
      <div class="mstat"><div class="l">Day / Night</div><div class="n">${dayPct}%<span style="font-size:.6em;color:var(--muted)"> / ${nightPct}%</span></div></div>
      <div class="mstat"><div class="l">Rank (all)</div><div class="n">#${rank}<span style="font-size:.55em;color:var(--muted)"> / ${state.members.length}</span></div></div>
      <div class="mstat"><div class="l">Rank (${m.type})</div><div class="n">#${typeRank}<span style="font-size:.55em;color:var(--muted)"> / ${sameType.length}</span></div></div>
    </div>
    <div class="mchart-label">Monthly calls</div>
    <div class="mchart-wrap"><canvas id="cLine"></canvas></div>
    <div class="mgrid2">
      <div><div class="mchart-label">Day vs night</div><div class="mchart-wrap sm"><canvas id="cStack"></canvas></div></div>
      <div><div class="mchart-label">Quarter comparison</div><div class="mchart-wrap sm"><canvas id="cQ"></canvas></div></div>
    </div>`;

  document.getElementById("memberModal").style.display="flex";

  const ink=getComputedStyle(document.documentElement).getPropertyValue('--muted')||'#6a7280';
  const grid='rgba(140,140,140,0.15)';
  const red='#c4302b', blue='#1c5fa8', green='#1baf7a', gray='#c9c6bd';
  const trendCol=dir==="up"?"#1f7a4d":dir==="down"?"#b3261e":"#6a7280";
  const lbl=MONTHS.map(fmtMon);

  CHART_INSTANCES.push(new Chart(document.getElementById('cLine'),{type:'line',
    data:{labels:lbl,datasets:[{data:total,borderColor:trendCol,backgroundColor:'rgba(196,48,43,0.07)',borderWidth:2,fill:true,tension:0.3,pointRadius:4,pointBackgroundColor:trendCol}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,grid:{color:grid},ticks:{color:ink}},x:{grid:{display:false},ticks:{color:ink}}}}}));

  CHART_INSTANCES.push(new Chart(document.getElementById('cStack'),{type:'bar',
    data:{labels:lbl,datasets:[{label:'Day',data:day,backgroundColor:blue,stack:'s'},{label:'Night',data:night,backgroundColor:green,stack:'s'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,stacked:true,grid:{color:grid},ticks:{color:ink}},x:{stacked:true,grid:{display:false},ticks:{color:ink}}}}}));

  CHART_INSTANCES.push(new Chart(document.getElementById('cQ'),{type:'bar',
    data:{labels:['Q1 (Jan–Mar)','Q2 (Apr–Jun)'],datasets:[{data:[q1,q2],backgroundColor:[gray,trendCol],borderRadius:4,barPercentage:0.6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{y:{beginAtZero:true,grid:{color:grid},ticks:{color:ink}},x:{grid:{display:false},ticks:{color:ink}}}}}));
}
function closeMember(){document.getElementById("memberModal").style.display="none";destroyCharts();}
document.getElementById("modalClose").addEventListener("click",closeMember);
document.getElementById("memberModal").addEventListener("click",e=>{if(e.target.id==="memberModal")closeMember();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeMember();});
</script></body></html>
